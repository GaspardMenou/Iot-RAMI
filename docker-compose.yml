  services:
    node-db:
      image: timescale/timescaledb:latest-pg13
      container_name: iot-rami-db
      restart: always
      ports:
        - "5432:5432"
      environment:
        POSTGRES_USER: ${DB_USER}
        POSTGRES_PASSWORD: ${DB_PASSWORD}
        POSTGRES_DB: ${DB_NAME}
      volumes:
        - db-data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 20s
      networks:
        - rami-network

    kafka:
      image: apache/kafka:3.9.0
      container_name: iot-rami-kafka
      restart: always
      ports:
        - "9092:9092"
      environment:
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: "broker,controller"
        KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
        KAFKA_CONTROLLER_QUORUM_VOTERS: "1@iot-rami-kafka:9093"
        KAFKA_LISTENERS: "PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093"
        KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://iot-rami-kafka:29092,PLAINTEXT_HOST://${SERVER_HOST}:9092,CONTROLLER://iot-rami-kafka:9093"
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
        KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      healthcheck:
        test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:29092"]
        interval: 10s
        timeout: 10s
        retries: 10
        start_period: 30s
      networks:
        - rami-network

    node-backend:
      image: ghcr.io/gaspardmenou/iot-rami-backend:latest
      container_name: iot-rami-backend
      restart: always
      ports:
        - "3000:3000"
      environment:
        NODE_ENV: production
        NODE_PORT_IN: 3000
        DB_HOST: node-db
        DB_PORT: 5432
        DB_USER: ${DB_USER}
        DB_PASSWORD: ${DB_PASSWORD}
        DB_NAME: ${DB_NAME}
        DB_DIALECT: postgres
        JWT_SECRET: ${JWT_SECRET}
        REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
        BCRYPT_SALT_ROUNDS: 10
        KAFKA_BROKERS: "iot-rami-kafka:29092"
        FRONTEND_URL: "http://${SERVER_HOST}:8080"
      depends_on:
        node-db:
          condition: service_healthy
        kafka:
          condition: service_healthy
      networks:
        - rami-network

    frontend:
      image: ghcr.io/gaspardmenou/iot-rami-frontend:latest
      container_name: iot-rami-frontend
      restart: always
      ports:
        - "8080:80"
      environment:
        VITE_APP_BACK_URL: "http://${SERVER_HOST}:3000/api/v1"
        VITE_SOCKET_URL: "http://${SERVER_HOST}:3000"
      networks:
        - rami-network

    prometheus:
      image: prom/prometheus:latest
      container_name: iot-rami-prometheus
      restart: always
      ports:
        - "9090:9090"
      volumes:
        - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      depends_on:
        - node-backend
      networks:
        - rami-network

    grafana:
      image: grafana/grafana:latest
      container_name: iot-rami-grafana
      restart: always
      ports:
        - "3001:3000"
      volumes:
        - grafana-data:/var/lib/grafana
      environment:
        GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      depends_on:
        - prometheus
      networks:
        - rami-network

    watchtower:
      image: containrrr/watchtower
      container_name: iot-rami-watchtower
      restart: always
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
      environment:
        DOCKER_API_VERSION: "1.44"
        WATCHTOWER_POLL_INTERVAL: 300
        WATCHTOWER_CLEANUP: "true"
      command: iot-rami-backend iot-rami-frontend

  volumes:
    db-data:
    grafana-data:

  networks:
    rami-network:
      driver: bridge
