  version: "3.8"

  services:
    node-db:
      image: timescale/timescaledb:latest-pg13
      container_name: iot-rami-db
      restart: always
      ports:
        - "5432:5432"
      environment:
        POSTGRES_USER: ${DB_USER}
        POSTGRES_PASSWORD: ${DB_PASSWORD}
        POSTGRES_DB: ${DB_NAME}
      volumes:
        - db-data:/var/lib/postgresql/data
      networks:
        - rami-network

    zookeeper:
      image: confluentinc/cp-zookeeper:latest
      container_name: iot-rami-zookeeper
      restart: always
      environment:
        ZOOKEEPER_CLIENT_PORT: 2181
        ZOOKEEPER_TICK_TIME: 2000
      networks:
        - rami-network

    kafka:
      image: confluentinc/cp-kafka:7.5.0
      container_name: iot-rami-kafka
      restart: always
      ports:
        - "9092:9092"
      environment:
        KAFKA_BROKER_ID: 1
        KAFKA_ZOOKEEPER_CONNECT: "iot-rami-zookeeper:2181"
        KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://iot-rami-kafka:29092,PLAINTEXT_HOST://${SERVER_HOST}:9092"
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
        KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      depends_on:
        - zookeeper
      healthcheck:
        test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
        interval: 10s
        timeout: 10s
        retries: 10
        start_period: 30s
      networks:
        - rami-network

    node-backend:
      image: ghcr.io/gaspardmenou/iot-rami-backend:latest
      container_name: iot-rami-backend
      restart: always
      ports:
        - "3000:3000"
      environment:
        NODE_ENV: production
        NODE_PORT_IN: 3000
        DB_HOST: node-db
        DB_PORT: 5432
        DB_USER: ${DB_USER}
        DB_PASSWORD: ${DB_PASSWORD}
        DB_NAME: ${DB_NAME}
        DB_DIALECT: postgres
        JWT_SECRET: ${JWT_SECRET}
        BCRYPT_SALT_ROUNDS: 10
        KAFKA_BROKERS: "iot-rami-kafka:29092"
        FRONTEND_URL: "http://${SERVER_HOST}:8080"
      depends_on:
        node-db:
          condition: service_started
        kafka:
          condition: service_healthy
      networks:
        - rami-network

    frontend:
      image: ghcr.io/gaspardmenou/iot-rami-frontend:latest
      container_name: iot-rami-frontend
      restart: always
      ports:
        - "8080:80"
      environment:
        VITE_APP_BACK_URL: "http://${SERVER_HOST}:3000/api/v1"
        VITE_SOCKET_URL: "http://${SERVER_HOST}:3000"
      networks:
        - rami-network

    watchtower:
      image: containrrr/watchtower
      container_name: iot-rami-watchtower
      restart: always
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
      environment:
        DOCKER_API_VERSION: "1.44"
        WATCHTOWER_POLL_INTERVAL: 300
        WATCHTOWER_CLEANUP: "true"
      command: iot-rami-backend iot-rami-frontend

  volumes:
    db-data:

  networks:
    rami-network:
      driver: bridge
