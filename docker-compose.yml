version: "3.8"

services:
  node-db:
    image: timescale/timescaledb:latest-pg13
    container_name: iot-rami-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: umons-sensor-prod
      POSTGRES_PASSWORD: umons-sensor-prod
      POSTGRES_DB: umons-sensor-db-prod
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - rami-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: iot-rami-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - rami-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: iot-rami-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "iot-rami-zookeeper:2181"
      # IMPORTANT : On remplace localhost par l'IP réelle du serveur pour le listener externe
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://iot-rami-kafka:29092,PLAINTEXT_HOST://<IP_DU_SERVEUR_RAMI>:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - rami-network

  node-backend:
    image: ghcr.io/gaspardmenou/iot-rami-backend:latest
    container_name: iot-rami-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NODE_PORT_IN: 3000
      DB_HOST: node-db
      DB_PORT: 5432
      DB_USER: umons-sensor-prod
      DB_PASSWORD: umons-sensor-prod
      DB_NAME: umons-sensor-db-prod
      DB_DIALECT: postgres
      JWT_SECRET: votre_jwt_secret_super_secure
      BCRYPT_SALT_ROUNDS: 10
      KAFKA_BROKERS: "iot-rami-kafka:29092"
      FRONTEND_URL: "http://<IP_DU_SERVEUR_RAMI>:8080"
    depends_on:
      - node-db
      - kafka
    networks:
      - rami-network

  frontend:
    image: ghcr.io/gaspardmenou/iot-rami-frontend:latest
    container_name: iot-rami-frontend
    restart: always
    ports:
      - "8080:80"
    environment:
      VITE_APP_BACK_URL: "http://<IP_DU_SERVEUR_RAMI>:3000/api/v1"
      VITE_SOCKET_URL: "http://<IP_DU_SERVEUR_RAMI>:3000"
    networks:
      - rami-network

volumes:
  db-data:

networks:
  rami-network:
    driver: bridge
