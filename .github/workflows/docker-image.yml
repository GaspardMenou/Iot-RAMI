name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build ./umons-sensor-backend-1-feature-RAMI1-dev --file Dockerfile --tag umons-sensor-dev:$(date +%s)
