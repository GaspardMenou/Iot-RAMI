name: Fog Service CI

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - "fog-service/**"
      - ".github/workflows/fog-ci.yml"
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - "fog-service/**"
      - ".github/workflows/fog-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

defaults:
  run:
    working-directory: ./fog-service

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: fog-service/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: TypeScript build
        run: npm run build

  docker-push:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME=ghcr.io/${{ github.repository }}-fog" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV
      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./fog-service
          file: ./fog-service/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
