[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

lib_ldf_mode = deep+

lib_deps =
    ; On lie la librairie locale Common proprement
    symlink://../Common

    ; Dépendances pour la lib Common
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.0
    tzapu/WiFiManager@^2.0.17
    arduino-libraries/NTPClient@^3.2.1
    
    ; Dépendances spécifiques au DHT22
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    
    WiFiClientSecure
