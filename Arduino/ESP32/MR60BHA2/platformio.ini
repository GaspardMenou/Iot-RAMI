[env:seeed_xiao_esp32c6]
; ESP32-C6 nécessite Arduino-ESP32 3.x — le platform espressif32 officiel
; n'en est qu'à la 2.x. On utilise le fork pioarduino qui fournit la 3.x stable.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = seeed_xiao_esp32c6
framework = arduino
monitor_speed = 115200
extra_scripts = pre:fix_sysroot.py

lib_ldf_mode = deep+

lib_deps =
    ; Librairie locale Common (même pattern que les autres capteurs)
    symlink://../Common

    ; Dépendances pour la lib Common
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.0
    tzapu/WiFiManager@^2.0.17
    arduino-libraries/NTPClient@^3.2.1

    ; MR60BHA2 : bibliothèque Seeed mmWave (pas dans le registry PlatformIO → URL GitHub)
    https://github.com/Love4yzp/Seeed-mmWave-library.git
