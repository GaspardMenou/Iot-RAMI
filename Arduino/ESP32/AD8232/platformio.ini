[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_ldf_mode = deep+

lib_deps =
    ; On lie la librairie locale Common proprement
    symlink://../Common

    ; Dépendances pour la lib Common
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.0
    tzapu/WiFiManager@^2.0.17
    arduino-libraries/NTPClient@^3.2.1
    
    WiFiClientSecure
